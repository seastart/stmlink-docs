<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 深色背景版：白色到浅蓝的渐变，保持品牌感同时保证对比度 -->
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#AACCFF"/>
    </linearGradient>
  </defs>

  <!-- S 形连线（深色背景版） -->
  <path
    d="M 30 8 C 30 18 10 13 10 20 S 30 27 30 32"
    stroke="url(#g)"
    stroke-width="2.5"
    stroke-linecap="round"
    fill="none"
  />

  <!-- 上节点 -->
  <circle cx="30" cy="8" r="6" fill="url(#g)"/>

  <!-- 中节点 -->
  <circle cx="10" cy="20" r="4.5" fill="url(#g)"/>

  <!-- 下节点 -->
  <circle cx="30" cy="32" r="6" fill="url(#g)"/>

  <!-- 下节点外环（AI 感知圈） -->
  <circle cx="30" cy="32" r="9.5" stroke="#AACCFF" stroke-width="1.2" fill="none" opacity="0.25"/>
</svg>
