<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 从品牌蓝到深蓝的线性渐变（亮色背景版） -->
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3385FF"/>
      <stop offset="100%" stop-color="#0044CC"/>
    </linearGradient>
  </defs>

  <!--
    三节点 S 形连线
    上节点 (30, 8)  → SRTC 音视频流
    中节点 (10, 20) → Link 中继（核心连接）
    下节点 (30, 32) → SMeeting / AI Agent
    S 曲线：两段三次贝塞尔，平滑衔接
  -->
  <path
    d="M 30 8 C 30 18 10 13 10 20 S 30 27 30 32"
    stroke="url(#g)"
    stroke-width="2.5"
    stroke-linecap="round"
    fill="none"
  />

  <!-- 上节点：SRTC / 音视频流 -->
  <circle cx="30" cy="8" r="6" fill="url(#g)"/>

  <!-- 中节点：Link 中继，稍小以示层级 -->
  <circle cx="10" cy="20" r="4.5" fill="url(#g)"/>

  <!-- 下节点：SMeeting / AI Agent -->
  <circle cx="30" cy="32" r="6" fill="url(#g)"/>

  <!--
    下节点外环：象征 AI Agent 的"感知圈"
    opacity 较低，仅在较大尺寸下可见，小尺寸自然淡化
  -->
  <circle cx="30" cy="32" r="9.5" stroke="#0044CC" stroke-width="1.2" fill="none" opacity="0.22"/>
</svg>
